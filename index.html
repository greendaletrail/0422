<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My GitHub Pages Site</title>
<style>
    body {
        margin: 0;
        background: #222;
    }

    /* アニメーション全体の枠 */
    .slider {
        overflow: hidden;
        white-space: nowrap;
        width: 100%;
        height: 200px; /* 高さは画像に合わせて調整 */
        position: relative;
    }

    /* 画像を横に並べる */
    .slider-track {
        display: inline-flex;
        animation: scroll 40s linear infinite; /* 20秒でループ */
    }

    .slider-track img {
        width: auto;
        height: 200px;
    }

    /* 横スクロールアニメーション */
    @keyframes scroll {
        0% {
            transform: translateX(0);
        }
        100% {
            transform: translateX(-50%);
        }
    }
</style>
</head>
<body>

<div class="slider">
    <div class="slider-track">
        <!-- 同じ画像セットを2回繰り返すことでループ感を出す -->
        <img src="y (2).jpeg" alt="画像1">

</html>
